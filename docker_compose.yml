version: "3.9"

services:
  inference-server:
    build: .
    container_name: multi-model-inference-server
    ports:
      - "8000:8000"       # maps localhost:8000 to container:8000
    volumes:
      - ./models:/app/models   # model files persist outside the container
      - ./logs:/app/logs       # log files persist outside the container
    restart: unless-stopped 